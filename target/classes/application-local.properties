# Local profile (matches reporting-service pattern).
spring.datasource.url=${FIELDFORCE_DB_URL:jdbc:postgresql://localhost:5432/fieldforcedb}
spring.datasource.username=${FIELDFORCE_DB_USERNAME:fieldforcedb}
spring.datasource.password=${FIELDFORCE_DB_PASSWORD:fieldforcedb}
spring.datasource.driver-class-name=org.postgresql.Driver
# Local/dev: Flyway + JPA need more than pool size 2 (compose DB_POOL_MAX_SIZE). Compose may override via env.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_fieldforce
