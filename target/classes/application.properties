spring.application.name=fieldforce-service
server.port=${SERVER_PORT:8090}

spring.config.import=optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_fieldforce

management.endpoints.web.exposure.include=health,info,prometheus
logging.pattern.level=%5p [${spring.application.name:},%X{requestId:-}]

spring.cloud.circuitbreaker.resilience4j.enabled=true
management.health.circuitbreakers.enabled=true

# Lead pipeline / shop conversion (stub when disabled)
fieldforce.shop-integration.enabled=${FIELDFORCE_SHOP_INTEGRATION_ENABLED:false}
fieldforce.shop-integration.base-url=${FIELDFORCE_SHOP_INTEGRATION_BASE_URL:http://shop-service:8080}
fieldforce.duplicate.gps-threshold-meters=${FIELDFORCE_DUPLICATE_GPS_METERS:100}
fieldforce.duplicate.name-similarity=${FIELDFORCE_DUPLICATE_NAME_SIMILARITY:0.85}
